<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBC Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">
          <div class="logo-icon">
            <span>HBC</span>
          </div>
          <div class="logo-text">
            <span class="logo-name">HBC</span>
            <span class="logo-sub">Dashboard</span>
          </div>
        </div>
      </div>

      <ul class="nav-links">
        <li>
          <a href="#home" class="nav-link" data-page="home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Home
          </a>
        </li>
        <li>
          <a href="#marketing" class="nav-link" data-page="marketing">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            Marketing
          </a>
        </li>
        <li>
          <a href="#operations" class="nav-link" data-page="operations">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            Operations
          </a>
        </li>
        <li>
          <a href="#financial" class="nav-link" data-page="financial">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            Financial
          </a>
        </li>
        <li>
          <a href="#history" class="nav-link" data-page="history">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="12 8 12 12 14 14"/>
              <path d="M3.05 11a9 9 0 1 0 .5-4h0"/>
              <polyline points="1 4 3.05 7 6 5"/>
            </svg>
            History
          </a>
        </li>
      </ul>

      <div class="sidebar-footer">
        <div class="week-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="currentWeekLabel">—</span>
        </div>
      </div>
    </nav>

    <main class="main-content" id="mainContent">
      <!-- Rendered by JS -->
    </main>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/marketing.js"></script>
  <script src="js/operations.js"></script>
  <script src="js/financial.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
